name: Playwright Tests

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Select which Playwright spec to run'
        type: choice
        required: true
        default: leancode
        options:
          - leancode
          - patrol

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install firefox --with-deps

      - name: Run selected Playwright test (workflow dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: npx playwright test tests/${{ github.event.inputs.test_suite }}.spec.ts

      - name: Run Playwright tests (scheduled)
        if: github.event_name != 'workflow_dispatch'
        run: npx playwright test tests/leancode.spec.ts tests/patrol.spec.ts

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
